server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # In production the top-level nginx (docker/nginx/templates) intercepts
    # /api and /ws before they ever reach this container, so these two
    # blocks are normally unreachable. They exist so this container is also
    # directly usable standalone (e.g. via docker-compose.override.yml) for
    # testing before a domain + TLS are set up.
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /ws/ {
        proxy_pass http://backend:8000/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:js|css|woff2?|png|jpg|svg)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }
}
